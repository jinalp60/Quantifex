AWSTemplateFormatVersion: '2010-09-09'
Description: Quantifex Background Data Pipeline (Supabase + Upstash + Serverless)

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection URL (e.g., postgresql://user:pass@host:port/db)
    NoEcho: true
  UpstashRedisUrl:
    Type: String
    Description: Connection URL for Upstash Redis
  UpstashRedisToken:
    Type: String
    Description: REST Token for Upstash Redis
  BatchSize:
    Type: Number
    Description: Number of stock symbols per SQS message (default - 10)
    Default: 10
  SchedulerRate:
    Type: String
    Description: Frequency of the scheduler trigger (e.g., rate(5 minutes))
    Default: "rate(5 minutes)"
  QueueVisibilityTimeout:
    Type: Number
    Description: SQS Visibility Timeout in seconds
    Default: 60
  UserActivityWindowHours:
    Type: Number
    Description: Activity window for users in hours
    Default: 24
  MarketOpenUTC:
    Type: Number
    Description: UTCHours when market opens
    Default: 14
  MarketCloseUTC:
    Type: Number
    Description: UTCHours when market closes
    Default: 21
  PremiumTickers:
    Type: CommaDelimitedList
    Description: List of premium symbols for subscription filtering
    Default: "AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,VOO"
  AllowedOrigins:
    Type: String
    Description: Comma-separated list of allowed CORS origins
    Default: "*"

Resources:
  # 0. SNS Topic for Fan-out
  StockBatchTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: quantifex-stock-batch-topic

  # 1. SQS Queues
  StockPriceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: quantifex-stock-price-queue
      VisibilityTimeout: !Ref QueueVisibilityTimeout
      MessageRetentionPeriod: 3600

  StockIntelligenceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: quantifex-stock-intelligence-queue
      VisibilityTimeout: 120 # News + ML takes longer than prices
      MessageRetentionPeriod: 3600

  # SNS Subscriptions for Fan-out
  PriceQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref StockBatchTopic
      Format: json
      Protocol: sqs
      Endpoint: !GetAtt StockPriceQueue.Arn

  IntelligenceQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref StockBatchTopic
      Format: json
      Protocol: sqs
      Endpoint: !GetAtt StockIntelligenceQueue.Arn
      FilterPolicyScope: MessageBody
      FilterPolicy:
        symbols: !Ref PremiumTickers

  # SQS Policy to allow SNS to send messages
  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref StockPriceQueue
        - !Ref StockIntelligenceQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: "sns.amazonaws.com"
            Action: "sqs:SendMessage"
            Resource: "*"
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref StockBatchTopic

  # 2. IAM Role for Transport Lambdas
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: QuantifexTransportPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: 
                  - !GetAtt StockPriceQueue.Arn
                  - !GetAtt StockIntelligenceQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref StockBatchTopic

  # 3. Scheduler Lambda
  SchedulerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: scheduler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: quantifex-lambdas # Placeholder - assume code is uploaded here
        S3Key: scheduler-v5.zip
      Runtime: nodejs18.x
      Timeout: 30
      Environment:
        Variables:
          NODE_ENV: production
          SNS_TOPIC_ARN: !Ref StockBatchTopic
          DATABASE_URL: !Ref DatabaseUrl
          BATCH_SIZE: !Ref BatchSize
          USER_ACTIVITY_WINDOW_HOURS: !Ref UserActivityWindowHours
          MARKET_OPEN_UTC: !Ref MarketOpenUTC
          MARKET_CLOSE_UTC: !Ref MarketCloseUTC

  # 4. EventBridge Rule (Cron Trigger)
  SchedulerTrigger:
    Type: AWS::Events::Rule
    Properties:
      Description: "Triggers Stock Scheduler at configurable rate"
      ScheduleExpression: !Ref SchedulerRate
      State: ENABLED
      Targets:
        - Arn: !GetAtt SchedulerFunction.Arn
          Id: "SchedulerTarget"

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchedulerFunction
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt SchedulerTrigger.Arn

  # 5. Price Worker Lambda
  WorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: worker.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: quantifex-lambdas
        S3Key: worker-v5.zip
      Runtime: nodejs18.x
      Timeout: 60
      Environment:
        Variables:
          NODE_ENV: production
          DATABASE_URL: !Ref DatabaseUrl
          UPSTASH_REDIS_REST_URL: !Ref UpstashRedisUrl
          UPSTASH_REDIS_REST_TOKEN: !Ref UpstashRedisToken

  # 6. Price SQS Trigger for Worker
  PriceWorkerSQSTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt StockPriceQueue.Arn
      FunctionName: !Ref WorkerFunction
      BatchSize: 1

Outputs:
  StockIntelligenceQueueArn:
    Description: ARN of the Intelligence SQS Queue for cross-stack triggering
    Value: !GetAtt StockIntelligenceQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IntelligenceQueueArn"
  StockBatchTopicArn:
    Value: !Ref StockBatchTopic
    Export:
      Name: !Sub "${AWS::StackName}-BatchTopicArn"
