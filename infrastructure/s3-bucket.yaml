AWSTemplateFormatVersion: '2010-09-09'
Description: Core S3 Infrastructure for Quantifex Project

Parameters:
  ProjectName:
    Type: String
    Default: 'quantifex'
  BucketSuffix:
    Type: String
    Default: 'v1'
    Description: Unique suffix for bucket naming (e.g., v1, x52b)

Resources:
  LambdaCodeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-lambdas"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Project
          Value: Quantifex
        - Key: Purpose
          Value: Lambda Deployment Packages

  TrainingDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-training-data-${BucketSuffix}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ModelArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-models-${BucketSuffix}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  # Lambda Bucket Exports
  LambdaBucketName:
    Value: !Ref LambdaCodeBucket
    Export:
      Name: QuantifexLambdaBucketName
  LambdaBucketArn:
    Value: !GetAtt LambdaCodeBucket.Arn
    Export:
      Name: QuantifexLambdaBucketArn

  # Intelligence Data Bucket Exports
  TrainingDataBucketName:
    Value: !Ref TrainingDataBucket
    Export:
      Name: QuantifexTrainingDataBucketName
  TrainingDataBucketArn:
    Value: !GetAtt TrainingDataBucket.Arn
    Export:
      Name: QuantifexTrainingDataBucketArn

  # Intelligence Model Bucket Exports
  ModelArtifactBucketName:
    Value: !Ref ModelArtifactBucket
    Export:
      Name: QuantifexModelArtifactBucketName
  ModelArtifactBucketArn:
    Value: !GetAtt ModelArtifactBucket.Arn
    Export:
      Name: QuantifexModelArtifactBucketArn
